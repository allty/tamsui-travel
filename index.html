<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>淡水一日遊計畫</title>
<style>
  /* ── Base ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; background: #FFF0F5; color: #5A2D4A; }

  /* ── Floating hearts ── */
  .heart-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .fh { position: absolute; animation: floatUp linear infinite; opacity: 0; user-select: none; }
  @keyframes floatUp {
    0%  { transform: translateY(105vh) rotate(0deg);   opacity: 0; }
    10% { opacity: 0.14; }
    90% { opacity: 0.09; }
    100%{ transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* ── Header ── */
  header {
    position: relative; z-index: 1;
    background: linear-gradient(160deg, #FFB6C1 0%, #FF69B4 55%, #FF90B3 100%);
    color: white; text-align: center; padding: 0 20px 32px;
    box-shadow: 0 6px 24px rgba(255,105,180,.35);
  }
  .header-bunny-row { display: flex; justify-content: center; align-items: flex-end; gap: 16px; padding-top: 28px; margin-bottom: 14px; }
  .bounce  { animation: bnc 2.2s ease-in-out infinite; }
  .bounce2 { animation: bnc 2.2s ease-in-out infinite; animation-delay: .55s; }
  @keyframes bnc { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  header h1 { font-size: 2rem; text-shadow: 2px 3px 0 rgba(180,40,100,.3); letter-spacing: 2px; margin-bottom: 6px; }
  header p  { opacity: .88; font-size: .9rem; letter-spacing: 1px; }
  .header-hearts { display: flex; justify-content: center; gap: 8px; margin-top: 12px; font-size: 1.3rem; animation: hp 1.8s ease-in-out infinite; }
  @keyframes hp { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

  /* ── Section ── */
  section { max-width: 1060px; margin: 30px auto; padding: 0 16px; position: relative; z-index: 1; }
  h2 {
    font-size: 1.15rem; margin-bottom: 14px; padding: 8px 16px 8px 14px;
    background: linear-gradient(90deg, #FFD6E7 0%, transparent 100%);
    border-left: 4px solid #FF6B8A; border-radius: 0 20px 20px 0;
    color: #E8447A; display: flex; align-items: center; gap: 8px;
  }

  /* ── Itinerary ── */
  .itinerary { display: flex; flex-direction: column; gap: 8px; }
  .slot-block { border-radius: 14px; overflow: hidden; box-shadow: 0 4px 16px rgba(255,105,180,.13); }
  .slot-header { display: flex; justify-content: space-between; align-items: center; padding: 9px 16px; color: white; }
  .slot-label { font-weight: bold; font-size: .92rem; }
  .slot-range  { font-size: .8rem; opacity: .88; }
  .step { display: flex; align-items: center; gap: 12px; background: white; padding: 10px 16px; border-bottom: 1px solid #FFE4EF; }
  .slot-block .step:last-child { border-bottom: none; }
  .time { font-weight: bold; color: #FF6B8A; min-width: 52px; font-size: .88rem; flex-shrink: 0; }
  .step-name { flex: 1; font-size: .93rem; color: #5A2D4A; }
  .dur-badge { font-size: .74rem; color: #FFB6C1; background: #FFF0F5; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .travel-gap { background: #FFF8FB; padding: 3px 16px 3px 80px; font-size: .73rem; color: #FFCCD8; border-bottom: 1px solid #FFE4EF; }
  .return-step { background: #FFF0F5 !important; border-radius: 10px; }
  .step-return { color: #FFB6C1; font-style: italic; }

  /* ── Itin toolbar ── */
  .itin-toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
  .itin-toolbar label { font-size: .85rem; color: #8B4B6A; display: flex; align-items: center; gap: 6px; }
  .itin-toolbar input[type=time] { width: auto; padding: 5px 8px; font-size: .85rem; border: 1.5px solid #FFB6C1; border-radius: 10px; color: #5A2D4A; }
  .btn-auto { padding: 7px 18px; background: linear-gradient(135deg,#FF9BB5,#FF6B8A); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: .85rem; box-shadow: 0 3px 10px rgba(255,105,180,.3); transition: transform .15s; }
  .btn-auto:hover { transform: translateY(-2px); }
  .btn-custom { padding: 7px 16px; background: white; color: #FF6B8A; border: 2px solid #FF9BB5; border-radius: 20px; cursor: pointer; font-size: .85rem; transition: all .15s; }
  .btn-custom:hover { background: #FFF0F5; border-color: #FF6B8A; }

  /* ── Step controls ── */
  .step-controls { display: flex; gap: 3px; flex-shrink: 0; }
  .btn-move { width: 26px; height: 26px; border: 1.5px solid #FFD6E7; background: white; border-radius: 8px; cursor: pointer; font-size: .8rem; color: #FF9BB5; transition: all .12s; }
  .btn-move:hover { background: #FFF0F5; border-color: #FF9BB5; }
  .btn-remove-step { width: 26px; height: 26px; border: 1.5px solid #FFD6E7; background: white; border-radius: 8px; cursor: pointer; font-size: .8rem; color: #FF9BB5; }
  .btn-remove-step:hover { background: #FFF0F5; border-color: #FF6B8A; color: #FF6B8A; }
  .btn-add-itin { flex: 1; padding: 6px; border: 1.5px solid #FF9BB5; color: #FF9BB5; background: white; border-radius: 10px; cursor: pointer; font-size: .82rem; transition: all .12s; }
  .btn-add-itin:hover { background: #FFF0F5; border-color: #FF6B8A; color: #FF6B8A; }
  .step.in-itin { background: #FFFBFD; }
  .custom-step-name { color: #FFAAC4; font-style: italic; }

  /* ── Dur / Budget wraps ── */
  .dur-wrap { display: flex; align-items: center; gap: 4px; font-size: .8rem; color: #FFAAC4; white-space: nowrap; }
  .dur-wrap input { width: 52px; padding: 3px 6px; border: 1.5px solid #FFD6E7; border-radius: 8px; font-size: .82rem; text-align: center; color: #5A2D4A; }
  .dur-wrap input:focus { border-color: #FF9BB5; outline: none; }
  .budget-wrap { display: flex; align-items: center; gap: 3px; font-size: .8rem; color: #FFAAC4; white-space: nowrap; }
  .budget-wrap input { width: 64px; padding: 3px 6px; border: 1.5px solid #FFD6E7; border-radius: 8px; font-size: .82rem; text-align: right; color: #5A2D4A; }
  .budget-wrap input:focus { border-color: #FF9BB5; outline: none; }

  /* ── Travel gap ── */
  .travel-gap-edit { background: #FFF8FB; padding: 4px 14px; font-size: .75rem; color: #FFAAC4; border-bottom: 1px solid #FFE4EF; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .travel-gap-edit input { width: 42px; padding: 2px 5px; border: 1.5px solid #FFD6E7; border-radius: 8px; font-size: .75rem; text-align: center; color: #5A2D4A; }
  .travel-gap-edit input:focus { border-color: #FF9BB5; outline: none; }
  .mode-sel { padding: 2px 8px; border: 1.5px solid #FFD6E7; border-radius: 10px; font-size: .78rem; cursor: pointer; background: white; color: #FF9BB5; }
  .mode-sel:focus { outline: none; border-color: #FF9BB5; }
  .travel-dist { font-size: .7rem; color: #FFCCD8; margin-left: 2px; }

  /* ── Replace panel ── */
  .replace-panel { background: #FFF8FB; border: 1.5px solid #FFD6E7; border-radius: 12px; padding: 8px 12px; margin: 2px 0; display: none; }
  .replace-panel select { width: 100%; padding: 5px 8px; border: 1.5px solid #FFD6E7; border-radius: 8px; font-size: .85rem; color: #5A2D4A; }
  .btn-replace { padding: 4px 12px; border: 1.5px solid #FF9BB5; color: #FF9BB5; background: white; border-radius: 10px; cursor: pointer; font-size: .78rem; white-space: nowrap; }
  .btn-replace:hover { background: #FFF0F5; }

  /* ── Time summary ── */
  .time-summary { display: flex; flex-wrap: wrap; gap: 12px; background: white; border-radius: 14px; padding: 10px 16px; margin-bottom: 10px; box-shadow: 0 2px 10px rgba(255,105,180,.12); font-size: .85rem; color: #FFAAC4; border: 1.5px solid #FFD6E7; }
  .time-summary span { display: flex; align-items: center; gap: 4px; }
  .time-summary strong { color: #FF6B8A; font-weight: bold; }

  /* ── Toolbar & filters ── */
  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 18px; }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; flex: 1; }
  .filter-btn { padding: 6px 16px; border: 2px solid #FF9BB5; border-radius: 20px; background: white; color: #FF9BB5; cursor: pointer; font-size: .85rem; transition: all .15s; }
  .filter-btn.active, .filter-btn:hover { background: linear-gradient(135deg,#FF9BB5,#FF6B8A); color: white; border-color: transparent; }
  .btn-add { padding: 8px 20px; background: linear-gradient(135deg,#FF9BB5,#FF6B8A); color: white; border: none; border-radius: 20px; cursor: pointer; font-size: .9rem; font-weight: bold; box-shadow: 0 3px 10px rgba(255,105,180,.3); transition: transform .15s; white-space: nowrap; }
  .btn-add:hover { transform: translateY(-2px); }
  .btn-reset { padding: 8px 14px; background: white; color: #FFAAC4; border: 1.5px solid #FFD6E7; border-radius: 20px; cursor: pointer; font-size: .85rem; }
  .btn-reset:hover { color: #FF6B8A; border-color: #FF9BB5; }

  /* ── Cards ── */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
  .card { background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 16px rgba(255,105,180,.12); border: 1.5px solid #FFD6E7; transition: transform .2s, box-shadow .2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(255,105,180,.22); }
  .card-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; color: white; }
  .category-tag { font-size: .78rem; background: rgba(255,255,255,.25); padding: 2px 8px; border-radius: 10px; }
  .rating-tag { font-size: .95rem; font-weight: bold; }
  .card-body { padding: 14px; }
  .card-body h3 { font-size: 1.05rem; margin-bottom: 10px; color: #5A2D4A; }
  .info-row { display: flex; gap: 8px; margin-bottom: 5px; font-size: .85rem; color: #8B4B6A; }
  .icon { width: 20px; text-align: center; flex-shrink: 0; }
  .tips-box { margin-top: 10px; font-size: .83rem; color: #FF6B8A; background: #FFF0F5; padding: 7px 10px; border-radius: 10px; line-height: 1.5; border-left: 3px solid #FF9BB5; }
  .card-actions { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid #FFE4EF; }
  .btn-edit { flex: 1; padding: 6px; border: 1.5px solid #FF9BB5; color: #FF9BB5; background: white; border-radius: 10px; cursor: pointer; font-size: .82rem; transition: all .12s; }
  .btn-edit:hover { background: #FFF0F5; }
  .btn-del { flex: 1; padding: 6px; border: 1.5px solid #FFD6E7; color: #FFAAC4; background: white; border-radius: 10px; cursor: pointer; font-size: .82rem; }
  .btn-del:hover { border-color: #FF9BB5; color: #FF6B8A; background: #FFF0F5; }

  /* ── Budget table ── */
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 16px rgba(255,105,180,.12); border: 1.5px solid #FFD6E7; }
  td { padding: 11px 18px; border-bottom: 1px solid #FFE4EF; font-size: .93rem; }
  tr:last-child td { border: none; }
  #budget-table td:last-child { text-align: right; }
  #budget-table .total-row td { font-weight: bold; background: linear-gradient(90deg,#FFD6E7,#FFF0F5); color: #FF6B8A; }
  #budget-table .transport-row td:last-child input { width: 70px; padding: 3px 6px; border: 1.5px solid #FFD6E7; border-radius: 8px; font-size: .88rem; text-align: right; color: #5A2D4A; }
  #budget-table .transport-row td:last-child input:focus { border-color: #FF9BB5; outline: none; }

  /* ── Modal ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(90,45,74,.45); z-index: 100; align-items: center; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px; padding: 0; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; border: 2px solid #FFD6E7; box-shadow: 0 12px 40px rgba(255,105,180,.25); }
  .modal-head { background: linear-gradient(135deg,#FFB6C1,#FF69B4); padding: 18px 24px; border-radius: 18px 18px 0 0; display: flex; align-items: center; gap: 10px; }
  .modal h3 { margin: 0; font-size: 1.15rem; color: white; }
  .modal-body { padding: 22px 24px 26px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: .85rem; color: #8B4B6A; margin-bottom: 4px; font-weight: 500; }
  input, select, textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #FFD6E7; border-radius: 10px; font-size: .92rem; font-family: inherit; color: #5A2D4A; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #FF9BB5; box-shadow: 0 0 0 3px rgba(255,155,181,.15); }
  textarea { resize: vertical; min-height: 60px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save { flex: 1; padding: 10px; background: linear-gradient(135deg,#FF9BB5,#FF6B8A); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: .95rem; font-weight: bold; box-shadow: 0 3px 10px rgba(255,105,180,.3); }
  .btn-save:hover { opacity: .9; }
  .btn-cancel { padding: 10px 18px; background: white; color: #FFAAC4; border: 1.5px solid #FFD6E7; border-radius: 12px; cursor: pointer; font-size: .95rem; }
  .btn-cancel:hover { border-color: #FF9BB5; color: #FF6B8A; }

  /* ── Footer ── */
  footer { position: relative; z-index: 1; text-align: center; padding: 40px 20px 32px; background: linear-gradient(135deg,#FFB6C1,#FF69B4,#FFB6C1); color: white; margin-top: 20px; }
  .footer-bunnies { display: flex; justify-content: center; gap: 14px; margin-bottom: 16px; }
  footer p { opacity: .85; font-size: .8rem; margin-top: 6px; }
  .empty-msg { text-align: center; color: #FFB6C1; padding: 40px; grid-column: 1/-1; }
</style>
</head>
<body>

<!-- 浮動愛心背景 -->
<div class="heart-bg" id="heart-bg"></div>

<header>
  <div class="header-bunny-row">
    <div class="bounce"  id="hb-l"></div>
    <div class="bounce2" id="hb-c"></div>
    <div class="bounce"  id="hb-r"></div>
  </div>
  <h1>🌊 淡水一日遊 🐰</h1>
  <p id="subtitle">載入中…</p>
  <div class="header-hearts">💗 💕 💖 💗 💕</div>
</header>

<section>
  <h2>🐰 建議行程 <span id="itinerary-note" style="font-size:0.78rem;font-weight:normal;opacity:.7;margin-left:4px;"></span></h2>
  <div class="itin-toolbar">
    <label>出發時間 <input type="time" id="start-time" value="09:00" onchange="renderItinerary(load())"></label>
    <button class="btn-auto" onclick="autoArrange()">自動排列</button>
    <button class="btn-custom" onclick="openCustomStep()">+ 新增自訂項目</button>
  </div>
  <div class="itinerary" id="itinerary"></div>
</section>

<section>
  <h2>💗 景點管理</h2>
  <div class="toolbar">
    <div class="filters" id="filters"></div>
    <button class="btn-reset" onclick="resetData()">還原預設</button>
    <button class="btn-add" onclick="openModal()">+ 新增景點</button>
  </div>
  <div class="cards" id="cards"></div>
</section>

<section>
  <h2>💰 預算估算</h2>
  <table id="budget-table"><tbody id="budget-body"></tbody></table>
</section>

<footer>
  <div class="footer-bunnies" id="footer-bunnies"></div>
  <p style="font-size:1rem;font-weight:bold;letter-spacing:1px;">因為愛你，所以才這樣規劃旅程 💗</p>
  <p>資料儲存於瀏覽器本機（localStorage），清除瀏覽器資料前永久保留</p>
</footer>

<!-- 新增 / 編輯 Modal -->
<div class="overlay" id="overlay" onclick="closeOnBg(event)">
  <div class="modal">
    <div class="modal-head">
      <span id="modal-head-bunny"></span>
      <h3 id="modal-title">新增景點</h3>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>景點名稱 *</label>
        <input id="f-name" type="text" placeholder="例：淡水老街">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>類別 *</label>
          <select id="f-category">
            <option>景點</option>
            <option>古蹟</option>
            <option>美食</option>
            <option>咖啡廳</option>
            <option>廟宇</option>
            <option>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>評分（1.0–5.0）*</label>
          <input id="f-rating" type="number" min="1" max="5" step="0.1" placeholder="4.2">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>建議停留時間</label>
          <input id="f-duration" type="text" placeholder="例：1–2 小時">
        </div>
        <div class="form-group">
          <label>費用</label>
          <input id="f-price" type="text" placeholder="例：免費 / NT$80">
        </div>
      </div>
      <div class="form-group">
        <label>交通方式</label>
        <input id="f-transport" type="text" placeholder="例：淡水站步行 5 分鐘">
      </div>
      <div class="form-group">
        <label>小提示</label>
        <textarea id="f-tips" placeholder="推薦必吃、最佳時段…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-save" onclick="saveAttraction()">儲存 💗</button>
      </div>
    </div>
  </div>
</div>

<!-- 新增自訂行程項目 Modal -->
<div class="overlay" id="overlay-custom" onclick="if(event.target===this)closeCustomStep()">
  <div class="modal">
    <div class="modal-head">
      <span id="custom-head-bunny"></span>
      <h3>🐰 新增自訂行程項目</h3>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>項目名稱 *（例：午休、移動至漁人碼頭）</label>
        <input id="cs-name" type="text" placeholder="例：搭公車前往紅毛城">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>所需時間</label>
          <input id="cs-duration" type="text" placeholder="例：30 分鐘">
        </div>
        <div class="form-group">
          <label>移動時間（分鐘）</label>
          <input id="cs-travel" type="number" value="15" min="0" max="120">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCustomStep()">取消</button>
        <button class="btn-save" onclick="saveCustomStep()">加入行程 💗</button>
      </div>
    </div>
  </div>
</div>

<script>
const CATEGORY_COLOR = {
  "景點": "#2196F3", "古蹟": "#795548", "美食": "#FF5722",
  "甜點": "#E91E63", "咖啡廳": "#8D6E63", "廟宇": "#9C27B0", "其他": "#607D8B"
};

const DEFAULTS = [
  { id: 1,  name: "淡水日落碼頭",       category: "景點",  rating: 4.5, duration: "30–60 分鐘",  price: "免費",                              tips: "台灣十大夕陽之一，傍晚 17:30 後最美",        transport: "淡水捷運站步行 5 分鐘" },
  { id: 2,  name: "紅毛城",             category: "古蹟",  rating: 4.4, duration: "1–1.5 小時",  price: "全票 NT$80，優待票 NT$40",           tips: "荷蘭時期建造，台灣保存最完整的西式古堡",    transport: "淡水站搭紅 26 公車，紅毛城站下車" },
  { id: 3,  name: "漁人碼頭",           category: "景點",  rating: 4.3, duration: "1–1.5 小時",  price: "免費（餐廳人均 NT$200–400）",        tips: "黃昏時分景色最美，可看夕陽與情人橋",        transport: "淡水站搭紅 26 公車約 15 分鐘" },
  { id: 4,  name: "真理大學校園",       category: "景點",  rating: 4.3, duration: "30–45 分鐘",  price: "免費",                              tips: "歐式建築，牛津學堂為台灣最早西式學校",        transport: "紅毛城步行 5 分鐘" },

// 使用 OSRM 免費公開 API 查詢步行/開車時間
const travelCache = {};

async function fetchTravelTime(fromId, toId, mode) {
  const key = `${mode}-${fromId}-${toId}`;
  if (travelCache[key]) return travelCache[key];
  const from = COORDS[fromId], to = COORDS[toId];
  if (!from || !to) return null;
  // OSRM 公開伺服器只有 driving 資料，但道路距離對步行同樣適用
  const url = `https://router.project-osrm.org/route/v1/driving/${from[1]},${from[0]};${to[1]},${to[0]}?overview=false`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (d.code === "Ok" && d.routes && d.routes.length) {
      const distM = d.routes[0].distance;
      const km    = (distM / 1000).toFixed(1);
      // 汽車用 OSRM duration；步行 80 m/min（≈4.8 km/h）
      const mins  = mode === "car"
        ? Math.max(1, Math.ceil(d.routes[0].duration / 60))
        : Math.max(1, Math.ceil(distM / 80));
      travelCache[key] = { mins, km };
      return travelCache[key];
    }
  } catch (e) {}
  // 備援：Haversine 直線距離 × 1.3 道路修正係數
  const R = 6371000;
  const dLat = (to[0]-from[0]) * Math.PI/180;
  const dLng = (to[1]-from[1]) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(from[0]*Math.PI/180)*Math.cos(to[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  const distM = R * 2 * Math.asin(Math.sqrt(a)) * 1.3;
  const km    = (distM / 1000).toFixed(1);
  const mins  = mode === "car"
    ? Math.max(1, Math.ceil(distM / 300))   // 300 m/min = 18 km/h
    : Math.max(1, Math.ceil(distM / 80));   // 80 m/min 步行
  const result = { mins, km };
  travelCache[key] = result;
  return result;
}

async function updateStepMode(iid, mode) {
  const itin = loadItin() || [];
  const idx = itin.findIndex(x => x.iid === iid);
  if (idx < 0) return;
  itin[idx].travelMode = mode;
  saveItin(itin);
  renderItinerary(load()); // 立即更新模式圖示（保留舊時間）
  const cur = itin[idx], next = itin[idx + 1];
  if (cur.attractionId && next && next.attractionId) {
    const result = await fetchTravelTime(cur.attractionId, next.attractionId, mode);
    if (result) {
      const itin2 = loadItin() || [];
      const item2 = itin2.find(x => x.iid === iid);
      if (item2 && item2.travelMode === mode) {
        item2.travelMin = result.mins;
        item2.travelKm  = result.km;
        saveItin(itin2);
        renderItinerary(load());
      }
    }
  }
}

// ── 行程 localStorage ─────────────────────────────────────────────────────────
function loadItin() {
  const raw = localStorage.getItem(ITIN_KEY);
  return raw ? JSON.parse(raw) : null;
}
function saveItin(items) { localStorage.setItem(ITIN_KEY, JSON.stringify(items)); }

function getStartMin() {
  const el = document.getElementById("start-time");
  if (!el || !el.value) return 9 * 60;
  const [h, m] = el.value.split(":").map(Number);
  return h * 60 + m;
}

// 將 attractions 自動排列成 itinerary 格式
function buildAutoItin(data) {
  const steps = optimizeItinerary(data);
  return steps.map(s => ({
    iid: s.id || Date.now() + Math.random(),
    name: s.name,
    duration: s.duration || "1 小時",
    durMin: Math.round(parseDuration(s.duration || "1 小時")),
    travelMin: TRAVEL,
    travelMode: "walk",
    budget: parsePrice(s.price),
    custom: false,
    attractionId: s.id,
  }));
}

// 從價格文字解析最低預估金額
function parsePrice(str) {
  if (!str) return 0;
  if (/免費/.test(str)) return 0;
  const m = str.match(/NT\$\s*(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

function updateStepBudget(iid, val) {
  const v = Math.max(0, parseInt(val) || 0);
  const itin = loadItin() || [];
  const item = itin.find(x => x.iid === iid);
  if (item) { item.budget = v; saveItin(itin); renderBudget(); }
}

const TRANSPORT_KEY = "tamsui_transport";
function getTransport() { return parseInt(localStorage.getItem(TRANSPORT_KEY) || "75"); }
function setTransport(v) { localStorage.setItem(TRANSPORT_KEY, Math.max(0, parseInt(v) || 0)); renderBudget(); }

function renderBudget() {
  const itin = loadItin() || [];
  const tbody = document.getElementById("budget-body");
  if (!tbody) return;
  const items = itin.filter(x => x.budget > 0 || !x.custom);
  let total = 0;
  let rows = items.map(item => {
    const b = item.budget || 0;
    total += b;
    return `<tr>
      <td>${item.name}</td>
      <td>NT$${b > 0 ? b.toLocaleString() : "–"}</td>
    </tr>`;
  }).join("");
  const transport = getTransport();
  total += transport;
  rows += `<tr class="transport-row">
    <td>交通費（捷運＋公車）</td>
    <td>NT$<input type="number" value="${transport}" min="0" max="9999"
      onchange="setTransport(this.value)" title="可自行修改"></td>
  </tr>`;
  rows += `<tr class="total-row">
    <td>合計</td>
    <td>NT$${total.toLocaleString()}</td>
  </tr>`;
  tbody.innerHTML = rows;
}

function removeStep(iid) {
  const itin = loadItin() || [];
  saveItin(itin.filter(x => x.iid !== iid));
  renderItinerary(load());
}

function moveStep(iid, dir) {
  const itin = loadItin() || [];
  const i = itin.findIndex(x => x.iid === iid);
  if (i + dir < 0 || i + dir >= itin.length) return;
  [itin[i], itin[i + dir]] = [itin[i + dir], itin[i]];
  saveItin(itin);
  renderItinerary(load());
}

  const name = document.getElementById("cs-name").value.trim();

// ── 行程最佳化 ────────────────────────────────────────────────────────────────
const SLOTS = [
  { id: 0, label: "早餐",           color: "#FF9800", start: 6*60    },
  { id: 1, label: "上午景點",       color: "#2196F3", start: 9*60+10 },
  { id: 2, label: "午餐",           color: "#F44336", start: 12*60   },
  { id: 3, label: "下午甜點＆咖啡", color: "#E91E63", start: 14*60   },
  { id: 4, label: "傍晚",           color: "#FF5722", start: 17*60   },
  { id: 5, label: "宵夜",           color: "#7B1FA2", start: 20*60   },
];
const TRAVEL = 15;

function parseDuration(str) {
  if (!str) return 60;
  const mixed = str.match(/(\d+)\s*分鐘[–\-](\d+\.?\d*)\s*小時/);
  if (mixed) return (parseInt(mixed[1]) + parseFloat(mixed[2]) * 60) / 2;
  const hrRange = str.match(/(\d+\.?\d*)[–\-](\d+\.?\d*)\s*小時/);
  if (hrRange) return ((parseFloat(hrRange[1]) + parseFloat(hrRange[2])) / 2) * 60;
  const hrSingle = str.match(/(\d+\.?\d*)\s*小時/);
  if (hrSingle) return parseFloat(hrSingle[1]) * 60;
  const minRange = str.match(/(\d+)[–\-](\d+)\s*分鐘/);
  if (minRange) return (parseInt(minRange[1]) + parseInt(minRange[2])) / 2;
  const minSingle = str.match(/(\d+)\s*分鐘/);
  if (minSingle) return parseInt(minSingle[1]);
  return 60;
}

function fmt(min) {
  const h = Math.floor(min / 60), m = min % 60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function parseOpenTime(hoursStr) {
  if (!hoursStr) return null;
  const m = hoursStr.match(/^(\d+):(\d+)/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
}

function slotOf(a) {
  if (/冰品|宵夜/.test(a.name)) return 5;
  if (/日落|夕陽|碼頭|漁人|港口/.test(a.name)) return 4;
  if (a.category === "咖啡廳" || a.category === "甜點") return 3;
  if (a.category === "美食") {
    const open = parseOpenTime(a.hours);
    return (open !== null && open < 9 * 60) ? 0 : 2;
  }
  return 1;
}

function optimizeItinerary(data) {
  const groups = {};
  SLOTS.forEach(s => { groups[s.id] = []; });
  data.forEach(a => { groups[slotOf(a)].push(a); });
  SLOTS.forEach(s => groups[s.id].sort((a, b) => b.rating - a.rating));

  const result = [];
  SLOTS.forEach(slot => {
    const items = groups[slot.id];
    if (!items.length) return;
    let t = slot.start;
    items.forEach((a, i) => {
      const dur = Math.round(parseDuration(a.duration));
      result.push({ ...a, startMin: t, startTime: fmt(t), endMin: t + dur, endTime: fmt(t + dur), slot: slot.id, slotLabel: slot.label, slotColor: slot.color });
      t += dur + TRAVEL;
    });
  });
  return result;
}

function renderItinerary(data) {
  const el = document.getElementById("itinerary");
  if (data.length === 0) {
    el.innerHTML = '<p style="color:#aaa;padding:16px;">尚無景點，請先新增</p>';

  let itin = loadItin();
  if (!itin) { itin = buildAutoItin(data); saveItin(itin); }

  // 確保每個 item 都有 durMin / travelMode（相容舊資料）
  itin.forEach(item => {
    if (!item.durMin) item.durMin = Math.round(parseDuration(item.duration || "1 小時"));
    if (!item.travelMode) item.travelMode = "walk";
  });

  let t = getStartMin();
  const inItinIds = new Set(itin.map(x => x.attractionId).filter(Boolean));

  document.querySelectorAll(".btn-add-itin").forEach(btn => {

    btn.textContent = inItinIds.has(aid) ? "已加入" : "加入行程";

    btn.style.opacity = inItinIds.has(aid) ? "0.5" : "1";
  });

  // 計算時間總計
  const totalStay   = itin.reduce((s, x) => s + (x.durMin || 60), 0);
  const totalTravel = itin.reduce((s, x, i) => s + (i < itin.length - 1 ? (x.travelMin ?? TRAVEL) : 0), 0);
  const totalMin    = totalStay + totalTravel + 10;
  const fmtDur = m => m >= 60 ? `${Math.floor(m/60)}h${m%60 ? (m%60)+"m" : ""}` : `${m}m`;

  // 替換下拉選項
  const replaceOptions = data.map(a =>
    `<option value="${a.id}">${a.name}（${a.category} ${a.rating}★）</option>`
  ).join("");

  const startTime = fmt(t);
  let html = `<div class="time-summary">
    <span>景點停留 <strong>${fmtDur(totalStay)}</strong></span>
    <span>移動時間 <strong>${fmtDur(totalTravel)}</strong></span>
    <span>全程合計 <strong>${fmtDur(totalMin)}</strong></span>
  </div>
  <div class="step" style="border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
    <span class="time">${startTime}</span><span class="step-name">捷運淡水站出發</span>
  </div>`;
  t += 10;

  itin.forEach((item, idx) => {
    const dur     = item.durMin || 60;
    const travel  = item.travelMin ?? TRAVEL;
    const startT  = fmt(t);
    const isFirst = idx === 0;
    const isLast  = idx === itin.length - 1;

    const mode = item.travelMode || "walk";
    html += `
    <div class="travel-gap-edit">
      <select class="mode-sel" onchange="updateStepMode(${item.iid}, this.value)" title="選擇交通方式">
        <option value="walk" ${mode==="walk"?"selected":""}>🚶 步行</option>
        <option value="car"  ${mode==="car" ?"selected":""}>🚗 汽車</option>
      </select>
      <input type="number" value="${travel}" min="0" max="360"
        onchange="updateStepTravel(${item.iid}, this.value)" title="移動時間（分鐘）">
      分鐘
      ${item.travelKm ? `<span class="travel-dist">${item.travelKm} km</span>` : ""}
    </div>
    <div class="step in-itin" style="border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
      <div class="step-controls">
        <button class="btn-move" onclick="moveStep(${item.iid},-1)" ${isFirst?"disabled":""}>▲</button>
        <button class="btn-move" onclick="moveStep(${item.iid},1)"  ${isLast?"disabled":""}>▼</button>
      </div>
      <span class="time">${startT}</span>
      <span class="step-name ${item.custom?"custom-step-name":""}">${item.name}</span>
      <div class="dur-wrap">
        停留
        <input type="number" value="${dur}" min="5" max="720"
          onchange="updateStepDur(${item.iid}, this.value)" title="停留時間（分鐘）">
        分鐘
      </div>
      <div class="budget-wrap">
        NT$<input type="number" value="${item.budget || 0}" min="0" max="99999"
          onchange="updateStepBudget(${item.iid}, this.value)" title="預估花費（NT$）">
      </div>
      <button class="btn-replace" onclick="toggleReplace(${item.iid})">替換</button>
      <button class="btn-remove-step" onclick="removeStep(${item.iid})" title="移除">✕</button>
    </div>
    <div class="replace-panel" id="rp-${item.iid}">
      <select onchange="replaceStep(${item.iid}, this.value)">
        <option value="">── 選擇替換景點 ──</option>
        ${replaceOptions}
      </select>
    </div>`;
    t += dur + travel;
  });

  const returnTime = fmt(t);
  html += `<div class="step return-step" style="margin-top:6px;">
    <span class="time">${returnTime}</span>
    <span class="step-name step-return">搭捷運返程</span>
  </div>`;

  el.innerHTML = html;
  document.getElementById("itinerary-note").textContent =
    `（${itin.length} 個行程項目，預計 ${returnTime} 返程）`;
  renderBudget();
}

function load() {
  const raw = localStorage.getItem(KEY);
  return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(DEFAULTS));
}

function save(data) { localStorage.setItem(KEY, JSON.stringify(data)); }

function stars(r) {
  return "★".repeat(Math.floor(r)) + (r % 1 >= 0.5 ? "½" : "") + " " + r;
}

function colorFor(cat) { return CATEGORY_COLOR[cat] || "#607D8B"; }

function render() {
  const data = load();
  renderItinerary(data);
  const container = document.getElementById("cards");
  const filtersEl = document.getElementById("filters");

  const cats = ["all", ...new Set(data.map(a => a.category))];
  filtersEl.innerHTML = cats.map(c =>
    `<button class="filter-btn ${activeFilter === c ? "active" : ""}" onclick="setFilter('${c}', this)">
      ${c === "all" ? "全部" : c}
    </button>`
  ).join("");

  const filtered = data
    .filter(a => activeFilter === "all" || a.category === activeFilter)
    .sort((a, b) => b.rating - a.rating);

  if (filtered.length === 0) {
    container.innerHTML = '<p class="empty-msg">目前沒有符合條件的景點</p>';
  } else {
    container.innerHTML = filtered.map(a => `
      <div class="card">
        <div class="card-header" style="background:${colorFor(a.category)}">
          <span class="category-tag">${a.category}</span>
          <span class="rating-tag">${stars(a.rating)}</span>
        </div>
        <div class="card-body">
          <h3>${a.name}</h3>
          ${a.hours     ? `<div class="info-row"><span class="icon">🕐</span><span>${a.hours}</span></div>` : ""}
          ${a.duration  ? `<div class="info-row"><span class="icon">⏱</span><span>${a.duration}</span></div>` : ""}
          ${a.price     ? `<div class="info-row"><span class="icon">💰</span><span>${a.price}</span></div>` : ""}
          ${a.transport ? `<div class="info-row"><span class="icon">🚌</span><span>${a.transport}</span></div>` : ""}
          ${a.tips      ? `<div class="tips-box">💡 ${a.tips}</div>` : ""}
        </div>
        <div class="card-actions">
          <button class="btn-add-itin" data-id="${a.id}" onclick="addToItin(${a.id})">加入行程</button>
          <button class="btn-edit" onclick="openModal(${a.id})">編輯</button>
          <button class="btn-del"  onclick="deleteAttraction(${a.id})">刪除</button>
        </div>
      </div>
    `).join("");
  }

  document.getElementById("subtitle").textContent = `共 ${data.length} 個景點`;
}

function setFilter(cat) { activeFilter = cat; render(); }

// ── CRUD ──────────────────────────────────────────────────────────────────────
function openModal(id) {
  editingId = id || null;
  const data = load();
  document.getElementById("modal-title").textContent = id ? "編輯景點" : "新增景點";
  if (id) {
    const a = data.find(x => x.id === id);
    document.getElementById("f-name").value      = a.name;
    document.getElementById("f-category").value  = a.category;
    document.getElementById("f-rating").value    = a.rating;
    document.getElementById("f-duration").value  = a.duration || "";
    document.getElementById("f-price").value     = a.price || "";
    document.getElementById("f-transport").value = a.transport || "";
    document.getElementById("f-tips").value      = a.tips || "";
  } else {
    ["f-name","f-rating","f-duration","f-price","f-transport","f-tips"]
      .forEach(fid => document.getElementById(fid).value = "");
    document.getElementById("f-category").value = "景點";
  }
  document.getElementById("overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
  editingId = null;
}

function closeOnBg(e) {
  if (e.target === document.getElementById("overlay")) closeModal();
}

function saveAttraction() {
  const name   = document.getElementById("f-name").value.trim();
  const rating = parseFloat(document.getElementById("f-rating").value);
  if (!name) { alert("請填寫景點名稱"); return; }
  if (isNaN(rating) || rating < 1 || rating > 5) { alert("評分請填 1.0–5.0"); return; }

  const entry = {
    name,
    category:  document.getElementById("f-category").value,
    rating:    Math.round(rating * 10) / 10,
    duration:  document.getElementById("f-duration").value.trim(),
    price:     document.getElementById("f-price").value.trim(),
    transport: document.getElementById("f-transport").value.trim(),
    tips:      document.getElementById("f-tips").value.trim(),
  };

  const data = load();
  if (editingId) {
    const i = data.findIndex(x => x.id === editingId);
    data[i] = { ...data[i], ...entry };
  } else {
    entry.id = Date.now();
    data.push(entry);
  }
  save(data);
  closeModal();
  render();
}

function deleteAttraction(id) {
  const data = load();
  const name = data.find(x => x.id === id)?.name;
  if (!confirm(`確定刪除「${name}」？`)) return;
  save(data.filter(x => x.id !== id));
  render();
}

function resetData() {
  if (!confirm("還原所有預設景點？目前的新增與修改將會消失。")) return;
  localStorage.removeItem(KEY);
  activeFilter = "all";
  render();
}

render();

// ── 兔兔 SVG 產生器 ───────────────────────────────────────────────
function mkBunny(expr, c, sz) {
  expr = expr || 'happy'; c = c || '#FFB6C1'; sz = sz || 70;
  const isBlue = expr === 'blue';
  const body  = isBlue ? '#85C1E9' : c;
  const inner = isBlue ? '#5B9FBF' : '#FF91A4';
  const nose  = isBlue ? '#5B9FBF' : '#FF8FAB';
  const heart = isBlue ? '#4A8EB5' : '#FF4477';

  function dot(cx,cy,r,f){return `<circle cx="${cx}" cy="${cy}" r="${r||4}" fill="${f||'#333'}"/>`;}
  function shine(cx,cy,r){return `<circle cx="${cx}" cy="${cy}" r="${r||1.5}" fill="white"/>`;}
  function xEye(lx,y){return `<line x1="${lx}" y1="${y}" x2="${lx+6}" y2="${y+6}" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="${lx}" y1="${y+6}" x2="${lx+6}" y2="${y}" stroke="#333" stroke-width="2.8" stroke-linecap="round"/>`;}
  function halfEye(cx,y){return `<path d="M${cx-5},${y} Q${cx},${y-6} ${cx+5},${y}" stroke="#333" stroke-width="2.8" fill="none" stroke-linecap="round"/>`;}
  function heartEye(lx,ty){return `<path d="M${lx+3},${ty+4} C${lx+1},${ty} ${lx-3},${ty} ${lx-3},${ty+3} C${lx-3},${ty+6} ${lx},${ty+8} ${lx+3},${ty+10} C${lx+6},${ty+8} ${lx+9},${ty+6} ${lx+9},${ty+3} C${lx+9},${ty} ${lx+5},${ty} ${lx+3},${ty+4}Z" fill="#FF4477"/>`;}
  function tears(){return `<ellipse cx="27" cy="65" rx="3" ry="5" fill="#ADE8F4" opacity=".8"/>
    <ellipse cx="53" cy="65" rx="3" ry="5" fill="#ADE8F4" opacity=".8"/>
    <ellipse cx="25" cy="73" rx="2.5" ry="3.5" fill="#ADE8F4" opacity=".7"/>
    <ellipse cx="55" cy="73" rx="2.5" ry="3.5" fill="#ADE8F4" opacity=".7"/>`;}

  const eyeMap = {
    happy:   dot(33,50)+dot(47,50)+shine(34.5,48.5)+shine(48.5,48.5),
    cry:     xEye(30,46)+xEye(44,46),
    shock:   dot(33,49,6)+dot(47,49,6)+shine(31,47,2)+shine(45,47,2),
    love:    heartEye(27,47)+heartEye(41,47),
    grumpy:  halfEye(33,52)+halfEye(47,52),
    excited: dot(33,49,6.5)+dot(47,49,6.5)+shine(31,47,2)+shine(45,47,2),
    hmm:     dot(33,51,3.5)+dot(47,51,3.5),
    blue:    dot(33,51,4,'#4A8EB5')+dot(47,51,4,'#4A8EB5'),
  };
  const mouthMap = {
    happy:   `<path d="M34,62 Q40,68 46,62" stroke="#FF8FAB" stroke-width="2.5" fill="none" stroke-linecap="round"/>`,
    cry:     `<ellipse cx="40" cy="67" rx="7" ry="8" fill="#555"/>`+tears(),
    shock:   `<ellipse cx="40" cy="68" rx="8.5" ry="9.5" fill="#555"/>`,
    love:    `<path d="M34,63 Q40,70 46,63" stroke="#FF8FAB" stroke-width="2.5" fill="none" stroke-linecap="round"/>`,
    grumpy:  `<path d="M34,67 Q40,62 46,67" stroke="#FF8FAB" stroke-width="2.5" fill="none" stroke-linecap="round"/>`,
    excited: `<ellipse cx="40" cy="68" rx="9" ry="10" fill="#555"/>`,
    hmm:     `<ellipse cx="40" cy="64" rx="5" ry="4" fill="#FF8FAB"/>`,
    blue:    `<path d="M34,65 Q40,59 46,65" stroke="#4A8EB5" stroke-width="2.5" fill="none" stroke-linecap="round"/>`,
  };
  const h = Math.round(sz*110/80);
  return `<svg viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${h}">
  <ellipse cx="25" cy="21" rx="9.5" ry="24" fill="${body}"/>
  <ellipse cx="25" cy="22" rx="5.5" ry="19" fill="${inner}"/>
  <ellipse cx="55" cy="21" rx="9.5" ry="24" fill="${body}"/>
  <ellipse cx="55" cy="22" rx="5.5" ry="19" fill="${inner}"/>
  <circle  cx="40" cy="54" r="26" fill="${body}"/>
  <ellipse cx="40" cy="88" rx="28" ry="23" fill="${body}"/>
  <path d="M40,83 C37,78 31,78 31,84 C31,88 37,93 40,96 C43,93 49,88 49,84 C49,78 43,78 40,83Z" fill="${heart}"/>
  ${eyeMap[expr]||eyeMap.happy}
  <ellipse cx="40" cy="61" rx="3.5" ry="2.5" fill="${nose}"/>
  ${mouthMap[expr]||mouthMap.happy}
</svg>`;
}
