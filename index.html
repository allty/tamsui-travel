<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="淡水一日遊行程規劃工具，包含景點、美食、預算、交通建議">
<title>淡水一日遊計畫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --ink:       #1a2332;
  --navy:      #1c3d6e;
  --navy-dk:   #0f2544;
  --navy-lt:   #e8f2fd;
  --sage:      #2a9a8c;
  --sage-lt:   #e2f4f1;
  --sand:      #f5ede2;
  --parchment: #fefcf8;
  --muted:     #6b7888;
  --border:    #e0d9ce;
  --border-lt: #ece7df;
  --s1: 0 1px 3px rgba(26,35,50,.05), 0 2px 12px rgba(28,61,110,.08);
  --s2: 0 2px 8px rgba(26,35,50,.06), 0 6px 24px rgba(28,61,110,.11);
  --s3: 0 4px 16px rgba(26,35,50,.08), 0 12px 40px rgba(28,61,110,.18);
  --r:    18px;
  --r-sm: 10px;
  --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-out: cubic-bezier(0, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: "Plus Jakarta Sans","Noto Sans TC","Microsoft JhengHei", sans-serif;
  background: var(--sand);
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  opacity: .03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

header {
  background:
    radial-gradient(ellipse 80% 70% at 10% 130%, rgba(42,154,140,.22) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% -10%, rgba(196,148,74,.1) 0%, transparent 50%),
    linear-gradient(158deg, #1a3a6a 0%, #0d2240 55%, #0a1c38 100%);
  color: white;
  padding: 44px 20px 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}
header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.018'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
}
.header-inner { position: relative; z-index: 1; }
header h1 {
  font-size: 2.25rem;
  font-weight: 800;
  letter-spacing: -.04em;
  margin-bottom: 6px;
  text-shadow: 0 2px 20px rgba(0,0,0,.3);
  text-wrap: balance;
  line-height: 1.2;
}
header .subtitle { opacity: .65; font-size: .87rem; font-weight: 500; margin-bottom: 22px; letter-spacing: .02em; }
.header-stats { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 30px; }
.stat-chip {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 100px;
  padding: 5px 14px;
  font-size: .76rem;
  font-weight: 600;
  letter-spacing: .03em;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.header-wave { display: block; width: 100%; margin-bottom: -2px; }

.tab-nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(254,252,248,.92);
  border-bottom: 1px solid var(--border-lt);
  box-shadow: 0 1px 0 rgba(28,61,110,.06), 0 4px 16px rgba(28,61,110,.06);
  display: flex;
  justify-content: center;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.tab-btn {
  flex: 1;
  max-width: 160px;
  padding: 14px 8px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: .85rem;
  font-weight: 600;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: color .2s var(--ease), border-color .2s var(--ease), background .2s var(--ease);
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  letter-spacing: .01em;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.active { color: var(--navy); border-bottom-color: var(--sage); font-weight: 700; }
.tab-btn:hover:not(.active) { color: var(--ink); background: rgba(28,61,110,.04); }
.tab-btn:focus-visible { outline: 2px solid var(--navy); outline-offset: -2px; }

.tab-content { display: none; }
.tab-content.active { display: block; }

.wrap { max-width: 960px; margin: 0 auto; padding: 28px 16px 40px; }

.section-title {
  font-size: .78rem;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.section-title::before {
  content: "";
  width: 3px;
  height: 14px;
  background: linear-gradient(to bottom, var(--sage), var(--navy));
  border-radius: 2px;
  flex-shrink: 0;
}

.itin-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
  background: var(--parchment);
  border-radius: var(--r-sm);
  padding: 14px 18px;
  box-shadow: var(--s1);
  border: 1px solid var(--border-lt);
}
.itin-toolbar label { font-size: .82rem; color: var(--muted); display: flex; align-items: center; gap: 8px; font-weight: 600; }
.itin-toolbar input[type=time] {
  padding: 8px 10px;
  font-size: .9rem;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--ink);
  font-family: inherit;
  background: var(--sand);
  transition: border-color .18s;
}
.itin-toolbar input[type=time]:focus { border-color: var(--navy); outline: none; box-shadow: 0 0 0 3px rgba(28,61,110,.1); }

.btn-auto {
  padding: 10px 22px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dk) 100%);
  color: white;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  font-size: .86rem;
  font-weight: 700;
  box-shadow: 0 2px 10px rgba(28,61,110,.3), inset 0 1px 0 rgba(255,255,255,.1);
  transition: box-shadow .2s var(--ease), transform .15s var(--ease-spring);
  font-family: inherit;
  letter-spacing: .02em;
  -webkit-tap-highlight-color: transparent;
}
.btn-auto:hover { box-shadow: 0 4px 18px rgba(28,61,110,.4), inset 0 1px 0 rgba(255,255,255,.1); transform: translateY(-1px); }
.btn-auto:active { transform: scale(0.97) translateY(1px); box-shadow: 0 1px 6px rgba(28,61,110,.3); }

.btn-custom {
  padding: 10px 18px;
  background: transparent;
  color: var(--navy);
  border: 1.5px solid rgba(28,61,110,.3);
  border-radius: 9px;
  cursor: pointer;
  font-size: .86rem;
  font-weight: 700;
  transition: all .18s var(--ease);
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.btn-custom:hover { background: var(--navy-lt); border-color: var(--navy); }
.btn-custom:active { transform: scale(0.97); }

.itinerary {
  display: flex;
  flex-direction: column;
  gap: 0;
  border-radius: var(--r-sm);
  overflow: hidden;
  box-shadow: var(--s2);
  border: 1px solid var(--border-lt);
}
.time-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  background: linear-gradient(135deg, var(--navy-dk) 0%, #0d1e36 100%);
  padding: 14px 20px;
  font-size: .8rem;
  color: rgba(255,255,255,.65);
}
.time-summary span { display: flex; align-items: center; gap: 6px; }
.time-summary strong { color: white; font-weight: 700; font-size: .88rem; font-variant-numeric: tabular-nums; }

.step { display: flex; align-items: center; gap: 10px; background: var(--parchment); padding: 13px 18px; border-bottom: 1px solid var(--border-lt); }
.time { font-weight: 700; color: var(--navy); min-width: 52px; font-size: .84rem; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.step-name { flex: 1; font-size: .92rem; color: var(--ink); font-weight: 500; }
.return-step { background: var(--navy-lt) !important; }
.step-return { color: var(--navy); font-style: italic; font-weight: 600; }

.travel-gap-edit {
  background: #f8f5f0;
  padding: 6px 18px 6px 34px;
  font-size: .74rem;
  color: var(--muted);
  border-bottom: 1px solid var(--border-lt);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  border-left: 2px solid var(--border);
}
.travel-gap-edit input {
  width: 44px;
  padding: 3px 5px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  font-size: .76rem;
  text-align: center;
  color: var(--ink);
  font-family: inherit;
  background: white;
  transition: border-color .15s;
}
.travel-gap-edit input:focus { border-color: var(--navy); outline: none; }
.mode-sel {
  padding: 3px 8px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: .76rem;
  cursor: pointer;
  background: white;
  color: var(--muted);
  font-family: inherit;
  transition: border-color .15s;
}
.mode-sel:focus { outline: none; border-color: var(--navy); }
.travel-dist { font-size: .7rem; color: #aaa; }

.step.in-itin {
  flex-direction: column;
  align-items: stretch;
  gap: 0;
  background: var(--parchment);
  padding: 14px 18px;
  border-left: 3px solid var(--sage);
  transition: border-color .2s var(--ease), background .2s var(--ease);
}
.step.in-itin:hover { background: #fdfaf6; border-left-color: var(--navy); }
.step-row-top { display: flex; align-items: center; gap: 8px; }
.step-row-bottom {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 9px;
  padding-top: 9px;
  border-top: 1px solid var(--border-lt);
}
.step-controls { display: flex; gap: 3px; flex-shrink: 0; }
.btn-move {
  width: 30px;
  height: 30px;
  border: 1.5px solid var(--border);
  background: white;
  border-radius: 7px;
  cursor: pointer;
  font-size: .78rem;
  color: var(--navy);
  transition: all .15s var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.btn-move:hover { background: var(--navy-lt); border-color: var(--navy); transform: translateY(-1px); }
.btn-move:active { transform: scale(0.93); }
.btn-move:disabled { opacity: .22; cursor: default; transform: none; }

.btn-remove-step {
  width: 30px;
  height: 30px;
  border: 1.5px solid var(--border-lt);
  background: transparent;
  border-radius: 7px;
  cursor: pointer;
  font-size: .76rem;
  color: #c0b8c4;
  margin-left: auto;
  flex-shrink: 0;
  transition: all .15s var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.btn-remove-step:hover { background: #fff0f0; border-color: #e57373; color: #e57373; }
.btn-remove-step:active { transform: scale(0.93); }

.custom-step-name { color: var(--muted); font-style: italic; }
.dur-wrap {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: .78rem;
  color: var(--muted);
  white-space: nowrap;
  font-weight: 500;
}
.dur-wrap input {
  width: 52px;
  padding: 4px 6px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  font-size: .78rem;
  text-align: center;
  color: var(--ink);
  font-family: inherit;
  background: white;
  transition: border-color .15s;
  font-variant-numeric: tabular-nums;
}
.dur-wrap input:focus { border-color: var(--navy); outline: none; }
.budget-wrap {
  display: flex;
  align-items: center;
  gap: 3px;
  font-size: .78rem;
  color: var(--muted);
  white-space: nowrap;
  font-weight: 500;
}
.budget-wrap input {
  width: 66px;
  padding: 4px 6px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  font-size: .78rem;
  text-align: right;
  color: var(--ink);
  font-family: inherit;
  background: white;
  transition: border-color .15s;
  font-variant-numeric: tabular-nums;
}
.budget-wrap input:focus { border-color: var(--navy); outline: none; }
.replace-panel {
  background: var(--sand);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 8px 12px;
  margin: 2px 0;
  display: none;
}
.replace-panel select { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 7px; font-size: .88rem; color: var(--ink); font-family: inherit; background: white; }
.btn-replace {
  padding: 5px 14px;
  border: 1.5px solid rgba(28,61,110,.3);
  color: var(--navy);
  background: white;
  border-radius: 6px;
  cursor: pointer;
  font-size: .78rem;
  white-space: nowrap;
  transition: all .15s var(--ease);
  font-family: inherit;
  font-weight: 600;
  -webkit-tap-highlight-color: transparent;
}
.btn-replace:hover { background: var(--navy-lt); border-color: var(--navy); }
.btn-replace:active { transform: scale(0.95); }

.toolbar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.filters {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  padding: 7px 18px;
  border: 1.5px solid var(--border);
  border-radius: 100px;
  background: var(--parchment);
  color: var(--muted);
  cursor: pointer;
  font-size: .82rem;
  font-weight: 600;
  transition: all .18s var(--ease);
  white-space: nowrap;
  flex-shrink: 0;
  min-height: 38px;
  font-family: inherit;
  letter-spacing: .01em;
  -webkit-tap-highlight-color: transparent;
}
.filter-btn:hover { background: var(--navy-lt); border-color: var(--navy); color: var(--navy); }
.filter-btn.active { background: var(--navy); color: white; border-color: var(--navy); box-shadow: 0 2px 10px rgba(28,61,110,.28); }
.filter-btn:active { transform: scale(0.95); }

.toolbar-actions { display: flex; gap: 10px; }
.btn-add {
  padding: 10px 22px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dk) 100%);
  color: white;
  border: none;
  border-radius: 9px;
  cursor: pointer;
  font-size: .88rem;
  font-weight: 700;
  box-shadow: 0 2px 10px rgba(28,61,110,.3), inset 0 1px 0 rgba(255,255,255,.1);
  transition: box-shadow .2s var(--ease), transform .15s var(--ease-spring);
  white-space: nowrap;
  min-height: 44px;
  font-family: inherit;
  letter-spacing: .01em;
  -webkit-tap-highlight-color: transparent;
}
.btn-add:hover { box-shadow: 0 4px 18px rgba(28,61,110,.4); transform: translateY(-1px); }
.btn-add:active { transform: scale(0.97); }

.btn-reset {
  padding: 10px 16px;
  background: var(--parchment);
  color: var(--muted);
  border: 1.5px solid var(--border);
  border-radius: 9px;
  cursor: pointer;
  font-size: .85rem;
  font-weight: 600;
  min-height: 44px;
  font-family: inherit;
  transition: all .18s var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.btn-reset:hover { color: var(--navy); border-color: var(--navy); background: var(--navy-lt); }
.btn-reset:active { transform: scale(0.97); }

.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card {
  background: var(--parchment);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--s1);
  border: 1px solid rgba(0,0,0,.04);
  transition: transform .25s var(--ease), box-shadow .25s var(--ease);
  animation: fadeInUp .35s var(--ease-out) both;
}
.card:nth-child(1) { animation-delay: 0ms; }
.card:nth-child(2) { animation-delay: 40ms; }
.card:nth-child(3) { animation-delay: 80ms; }
.card:nth-child(4) { animation-delay: 120ms; }
.card:nth-child(5) { animation-delay: 160ms; }
.card:nth-child(6) { animation-delay: 200ms; }
.card:nth-child(n+7) { animation-delay: 220ms; }
.card:hover { transform: translateY(-6px); box-shadow: var(--s3); }

.card-header { padding: 20px 18px 16px; color: white; position: relative; overflow: hidden; }
.card-header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,.07) 0%, transparent 50%);
  pointer-events: none;
}
.card-header::after {
  content: "";
  position: absolute;
  right: -20px;
  top: -20px;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: rgba(255,255,255,.07);
  pointer-events: none;
}
.card-header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.category-tag {
  font-size: .7rem;
  background: rgba(255,255,255,.16);
  border: 1px solid rgba(255,255,255,.24);
  padding: 3px 10px;
  border-radius: 100px;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.rating-tag { font-size: .9rem; font-weight: 800; opacity: .95; font-variant-numeric: tabular-nums; }
.card-title {
  font-size: 1.08rem;
  font-weight: 700;
  text-shadow: 0 1px 8px rgba(0,0,0,.18);
  letter-spacing: -.02em;
  position: relative;
  z-index: 1;
}
.card-body { padding: 14px 18px 8px; }
.info-row { display: flex; gap: 8px; margin-bottom: 7px; font-size: .82rem; color: var(--muted); align-items: flex-start; }
.icon { width: 18px; text-align: center; flex-shrink: 0; font-size: .85rem; margin-top: 1px; }
.tips-box {
  margin-top: 10px;
  font-size: .79rem;
  color: #2d6b65;
  background: var(--sage-lt);
  padding: 10px 12px;
  border-radius: 9px;
  line-height: 1.65;
  border-left: 2.5px solid var(--sage);
  font-weight: 500;
}
.card-actions { display: flex; gap: 8px; padding: 10px 18px 16px; }
.btn-add-itin {
  flex: 2;
  padding: 9px 6px;
  border: 1.5px solid var(--navy);
  color: var(--navy);
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  font-size: .82rem;
  font-weight: 700;
  transition: all .18s var(--ease);
  min-height: 42px;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.btn-add-itin:hover { background: var(--navy-lt); }
.btn-add-itin:active { transform: scale(0.96); }
.btn-add-itin:disabled { opacity: .35; cursor: default; transform: none; }

.btn-edit {
  flex: 1;
  padding: 9px 6px;
  border: 1.5px solid var(--border);
  color: var(--muted);
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  font-size: .82rem;
  font-weight: 600;
  min-height: 42px;
  font-family: inherit;
  transition: all .18s var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.btn-edit:hover { color: var(--navy); border-color: var(--navy); background: var(--navy-lt); }
.btn-edit:active { transform: scale(0.96); }

.btn-del {
  flex: 1;
  padding: 9px 6px;
  border: 1.5px solid var(--border);
  color: var(--muted);
  background: transparent;
  border-radius: 8px;
  cursor: pointer;
  font-size: .82rem;
  font-weight: 600;
  min-height: 42px;
  font-family: inherit;
  transition: all .18s var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.btn-del:hover { border-color: #e57373; color: #c0392b; background: #fff5f5; }
.btn-del:active { transform: scale(0.96); }

.budget-card { background: var(--parchment); border-radius: var(--r); overflow: hidden; box-shadow: var(--s2); border: 1px solid rgba(0,0,0,.04); }
table { width: 100%; border-collapse: collapse; }
td { padding: 13px 20px; border-bottom: 1px solid var(--border-lt); font-size: .9rem; }
tr:last-child td { border: none; }
#budget-table td:last-child { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
#budget-table .total-row td {
  font-weight: 700;
  background: linear-gradient(135deg, var(--navy-dk) 0%, #0d1e36 100%);
  color: white;
  font-size: .95rem;
  letter-spacing: .01em;
}
#budget-table .transport-row td:last-child input {
  width: 74px;
  padding: 5px 8px;
  border: 1.5px solid var(--border);

  font-size: .9rem;
  text-align: right;
  color: var(--ink);
  font-family: inherit;
  background: var(--sand);
  font-variant-numeric: tabular-nums;
}
#budget-table .transport-row td:last-child input:focus { border-color: var(--navy); outline: none; }

.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(8,14,26,.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--parchment);
  border-radius: var(--r);
  width: 480px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,.32), 0 4px 16px rgba(28,61,110,.12);

  border: 1px solid rgba(255,255,255,.5);
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-head {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dk) 100%);
  padding: 20px 24px;
  border-radius: var(--r) var(--r) 0 0;
}

.modal-body { padding: 22px 24px 28px; }
.form-group { margin-bottom: 14px; }
label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: 5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
input, select, textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  font-size: .93rem;
  font-family: inherit;
  color: var(--ink);
  background: var(--sand);
  transition: border-color .18s, box-shadow .18s;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--navy); box-shadow: 0 0 0 3px rgba(28,61,110,.1); background: white; }
textarea { resize: vertical; min-height: 72px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; margin-top: 22px; }
.btn-save {
  flex: 1;
  padding: 13px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dk) 100%);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: .95rem;
  font-weight: 700;
  font-family: inherit;
  box-shadow: 0 2px 10px rgba(28,61,110,.3);
  transition: all .18s var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.btn-save:hover { box-shadow: 0 4px 16px rgba(28,61,110,.4); transform: translateY(-1px); }
.btn-save:active { transform: scale(0.97); }
.btn-cancel {
  padding: 13px 20px;
  background: transparent;
  color: var(--muted);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  font-size: .95rem;
  font-family: inherit;
  font-weight: 600;

.btn-cancel:hover { border-color: var(--navy); color: var(--navy); background: var(--navy-lt); }
.btn-cancel:active { transform: scale(0.97); }

footer { text-align: center; padding: 28px; color: var(--muted); font-size: .75rem; font-weight: 500; opacity: .7; }
.empty-msg { text-align: center; color: #c0b8ad; padding: 56px; grid-column: 1/-1; font-weight: 500; font-size: .9rem; }

const KEY="tamsui_attractions",ITIN_KEY="tamsui_itinerary",VERSION_KEY="tamsui_version",DATA_VERSION="5";

const travelCache={};

async function fetchTravelTime(fromId,toId,mode){
  const key=`${mode}-${fromId}-${toId}`;if(travelCache[key])return travelCache[key];
  const from=COORDS[fromId],to=COORDS[toId];if(!from||!to)return null;
  const url=`https://router.project-osrm.org/route/v1/driving/${from[1]},${from[0]};${to[1]},${to[0]}?overview=false`;
  try{const r=await fetch(url);const d=await r.json();
    if(d.code==="Ok"&&d.routes&&d.routes.length){
      const distM=d.routes[0].distance,km=(distM/1000).toFixed(1);
      const mins=mode==="car"?Math.max(1,Math.ceil(d.routes[0].duration/60)):Math.max(1,Math.ceil(distM/80));
      travelCache[key]={mins,km};return travelCache[key];
    }
  }catch(e){}
  const R=6371000,dLat=(to[0]-from[0])*Math.PI/180,dLng=(to[1]-from[1])*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(from[0]*Math.PI/180)*Math.cos(to[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  const distM=R*2*Math.asin(Math.sqrt(a))*1.3,km=(distM/1000).toFixed(1);
  const mins=mode==="car"?Math.max(1,Math.ceil(distM/300)):Math.max(1,Math.ceil(distM/80));
  travelCache[key]={mins,km};return travelCache[key];
}

async function updateStepMode(iid,mode){
  const itin=loadItin()||[];const idx=itin.findIndex(x=>x.iid===iid);if(idx<0)return;
  itin[idx].travelMode=mode;saveItin(itin);renderItinerary(load());
  const cur=itin[idx],next=itin[idx+1];
  if(cur.attractionId&&next&&next.attractionId){
    const result=await fetchTravelTime(cur.attractionId,next.attractionId,mode);
    if(result){const itin2=loadItin()||[];const item2=itin2.find(x=>x.iid===iid);
      if(item2&&item2.travelMode===mode){item2.travelMin=result.mins;item2.travelKm=result.km;saveItin(itin2);renderItinerary(load());}
    }
  }
}

function parsePrice(str){if(!str)return 0;if(/免費/.test(str))return 0;const m=str.match(/NT\$\s*(\d+)/);return m?parseInt(m[1]):0;}
function updateStepBudget(iid,val){const v=Math.max(0,parseInt(val)||0);const itin=loadItin()||[];const item=itin.find(x=>x.iid===iid);if(item){item.budget=v;saveItin(itin);renderBudget();}}

function renderBudget(){
  const itin=loadItin()||[];const tbody=document.getElementById("budget-body");if(!tbody)return;
  let total=0;
  let rows=itin.filter(x=>x.budget>0||!x.custom).map(item=>{const b=item.budget||0;total+=b;return`<tr><td>${item.name}</td><td>NT$${b>0?b.toLocaleString():"–"}</td></tr>`;}).join("");
  const transport=getTransport();total+=transport;
  rows+=`<tr class="transport-row"><td>交通費（捷運＋公車）</td><td>NT$<input type="number" value="${transport}" min="0" max="9999" onchange="setTransport(this.value)"></td></tr>`;
  rows+=`<tr class="total-row"><td>合計</td><td>NT$${total.toLocaleString()}</td></tr>`;
  tbody.innerHTML=rows;
}

function updateStepDur(iid,val){const v=Math.max(5,Math.min(720,parseInt(val)||60));const itin=loadItin()||[];const item=itin.find(x=>x.iid===iid);if(item){item.durMin=v;saveItin(itin);renderItinerary(load());}}
function updateStepTravel(iid,val){const v=Math.max(0,Math.min(180,parseInt(val)||15));const itin=loadItin()||[];const item=itin.find(x=>x.iid===iid);if(item){item.travelMin=v;saveItin(itin);renderItinerary(load());}}
function toggleReplace(iid){const panel=document.getElementById(`rp-${iid}`);if(panel)panel.style.display=panel.style.display==="block"?"none":"block";}
function replaceStep(iid,aid){if(!aid)return;const data=load();const a=data.find(x=>x.id===parseInt(aid));if(!a)return;const itin=loadItin()||[];const item=itin.find(x=>x.iid===iid);if(item){item.name=a.name;item.duration=a.duration||"1 小時";item.durMin=Math.round(parseDuration(a.duration||"1 小時"));item.attractionId=a.id;item.custom=false;saveItin(itin);renderItinerary(data);}}
function autoArrange(){const data=load();if(!data.length)return;saveItin(buildAutoItin(data));renderItinerary(data);}
function addToItin(attractionId){const data=load();const a=data.find(x=>x.id===attractionId);if(!a)return;const itin=loadItin()||buildAutoItin(data);if(itin.find(x=>x.attractionId===attractionId)){alert(`「${a.name}」已在行程中`);return;}itin.push({iid:Date.now(),name:a.name,duration:a.duration||"1 小時",durMin:Math.round(parseDuration(a.duration||"1 小時")),travelMin:TRAVEL,travelMode:"walk",budget:parsePrice(a.price),custom:false,attractionId});saveItin(itin);renderItinerary(data);}
function removeStep(iid){const itin=loadItin()||[];saveItin(itin.filter(x=>x.iid!==iid));renderItinerary(load());}
function moveStep(iid,dir){const itin=loadItin()||[];const i=itin.findIndex(x=>x.iid===iid);if(i+dir<0||i+dir>=itin.length)return;[itin[i],itin[i+dir]]=[itin[i+dir],itin[i]];saveItin(itin);renderItinerary(load());}
function openCustomStep(){document.getElementById("overlay-custom").classList.add("open");}
function closeCustomStep(){document.getElementById("overlay-custom").classList.remove("open");}
function saveCustomStep(){const name=document.getElementById("cs-name").value.trim();if(!name){alert("請填寫項目名稱");return;}const duration=document.getElementById("cs-duration").value.trim()||"30 分鐘";const travelMin=parseInt(document.getElementById("cs-travel").value)||15;const itin=loadItin()||buildAutoItin(load());itin.push({iid:Date.now(),name,duration,travelMin,custom:true,attractionId:null});saveItin(itin);closeCustomStep();renderItinerary(load());}

const SLOTS=[{id:0,label:"早餐",color:"#FF9800",start:6*60},{id:1,label:"上午景點",color:"#2196F3",start:9*60+10},{id:2,label:"午餐",color:"#F44336",start:12*60},{id:3,label:"下午甜點＆咖啡",color:"#E91E63",start:14*60},{id:4,label:"傍晚",color:"#FF5722",start:17*60},{id:5,label:"宵夜",color:"#7B1FA2",start:20*60}];
const TRAVEL=15;

function parseDuration(str){if(!str)return 60;const mixed=str.match(/(\d+)\s*分鐘[–\-](\d+\.?\d*)\s*小時/);if(mixed)return(parseInt(mixed[1])+parseFloat(mixed[2])*60)/2;const hrRange=str.match(/(\d+\.?\d*)[–\-](\d+\.?\d*)\s*小時/);if(hrRange)return((parseFloat(hrRange[1])+parseFloat(hrRange[2]))/2)*60;const hrSingle=str.match(/(\d+\.?\d*)\s*小時/);if(hrSingle)return parseFloat(hrSingle[1])*60;const minRange=str.match(/(\d+)[–\-](\d+)\s*分鐘/);if(minRange)return(parseInt(minRange[1])+parseInt(minRange[2]))/2;const minSingle=str.match(/(\d+)\s*分鐘/);if(minSingle)return parseInt(minSingle[1]);return 60;}
function fmt(min){const h=Math.floor(min/60),m=min%60;return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;}
function parseOpenTime(s){if(!s)return null;const m=s.match(/^(\d+):(\d+)/);return m?parseInt(m[1])*60+parseInt(m[2]):null;}
function slotOf(a){if(/冰品|宵夜/.test(a.name))return 5;if(/日落|夕陽|碼頭|漁人|港口/.test(a.name))return 4;if(a.category==="咖啡廳"||a.category==="甜點")return 3;if(a.category==="美食"){const open=parseOpenTime(a.hours);return(open!==null&&open<9*60)?0:2;}return 1;}
function optimizeItinerary(data){const groups={};SLOTS.forEach(s=>{groups[s.id]=[];});data.forEach(a=>{groups[slotOf(a)].push(a);});SLOTS.forEach(s=>groups[s.id].sort((a,b)=>b.rating-a.rating));const result=[];SLOTS.forEach(slot=>{const items=groups[slot.id];if(!items.length)return;let t=slot.start;items.forEach(a=>{const dur=Math.round(parseDuration(a.duration));result.push({...a,startMin:t,startTime:fmt(t),endMin:t+dur,endTime:fmt(t+dur),slot:slot.id,slotLabel:slot.label,slotColor:slot.color});t+=dur+TRAVEL;});});return result;}

function renderItinerary(data){
  const el=document.getElementById("itinerary");
  if(data.length===0){el.innerHTML='<p style="color:#aaa;padding:20px 16px;">尚無景點，請先新增</p>';document.getElementById("itinerary-note").textContent="";return;}
  let itin=loadItin();if(!itin){itin=buildAutoItin(data);saveItin(itin);}
  itin.forEach(item=>{if(!item.durMin)item.durMin=Math.round(parseDuration(item.duration||"1 小時"));if(!item.travelMode)item.travelMode="walk";});
  let t=getStartMin();
  const inItinIds=new Set(itin.map(x=>x.attractionId).filter(Boolean));
  document.querySelectorAll(".btn-add-itin").forEach(btn=>{const aid=parseInt(btn.dataset.id);btn.textContent=inItinIds.has(aid)?"✓ 已加入":"加入行程";btn.disabled=inItinIds.has(aid);btn.style.opacity=inItinIds.has(aid)?"0.4":"1";});
  const totalStay=itin.reduce((s,x)=>s+(x.durMin||60),0);
  const totalTravel=itin.reduce((s,x,i)=>s+(i<itin.length-1?(x.travelMin??TRAVEL):0),0);
  const totalMin=totalStay+totalTravel+10;
  const fmtDur=m=>m>=60?`${Math.floor(m/60)}h${m%60?(m%60)+"m":""}`:`${m}m`;
  const replaceOptions=data.map(a=>`<option value="${a.id}">${a.name}（${a.category} ${a.rating}）</option>`).join("");
  const startTime=fmt(t);
  let html=`<div class="time-summary">
    <span>景點停留 <strong>${fmtDur(totalStay)}</strong></span>
    <span>移動時間 <strong>${fmtDur(totalTravel)}</strong></span>
    <span>全程合計 <strong>${fmtDur(totalMin)}</strong></span>
  </div>
  <div class="step"><span class="time">${startTime}</span><span class="step-name">🚇 捷運淡水站出發</span></div>`;
  t+=10;
  itin.forEach((item,idx)=>{
    const dur=item.durMin||60,travel=item.travelMin??TRAVEL,startT=fmt(t);
    const isFirst=idx===0,isLast=idx===itin.length-1,mode=item.travelMode||"walk";
    html+=`
    <div class="travel-gap-edit">
      <select class="mode-sel" onchange="updateStepMode(${item.iid},this.value)">
        <option value="walk" ${mode==="walk"?"selected":""}>🚶 步行</option>
        <option value="car"  ${mode==="car" ?"selected":""}>🚗 汽車</option>
      </select>
      <input type="number" value="${travel}" min="0" max="360" onchange="updateStepTravel(${item.iid},this.value)"> 分鐘
      ${item.travelKm?`<span class="travel-dist">${item.travelKm} km</span>`:""}
    </div>
    <div class="step in-itin">
      <div class="step-row-top">
        <div class="step-controls">
          <button class="btn-move" onclick="moveStep(${item.iid},-1)" ${isFirst?"disabled":""}>▲</button>
          <button class="btn-move" onclick="moveStep(${item.iid},1)"  ${isLast?"disabled":""}>▼</button>
        </div>
        <span class="time">${startT}</span>
        <span class="step-name ${item.custom?"custom-step-name":""}">${item.name}</span>
        <button class="btn-remove-step" onclick="removeStep(${item.iid})" title="移除">✕</button>
      </div>
      <div class="step-row-bottom">
        <div class="dur-wrap">停留 <input type="number" value="${dur}" min="5" max="720" onchange="updateStepDur(${item.iid},this.value)"> 分鐘</div>
        <div class="budget-wrap">NT$<input type="number" value="${item.budget||0}" min="0" max="99999" onchange="updateStepBudget(${item.iid},this.value)"></div>
        <button class="btn-replace" onclick="toggleReplace(${item.iid})">替換</button>
      </div>
    </div>
    <div class="replace-panel" id="rp-${item.iid}">
      <select onchange="replaceStep(${item.iid},this.value)">
        <option value="">── 選擇替換景點 ──</option>${replaceOptions}
      </select>
    </div>`;
    t+=dur+travel;
  });
  html+=`<div class="step return-step"><span class="time">${fmt(t)}</span><span class="step-name step-return">🚇 搭捷運返程</span></div>`;
  el.innerHTML=html;
  document.getElementById("itinerary-note").textContent=`（${itin.length} 個項目，預計 ${fmt(t)} 返程）`;
  renderBudget();
}

function load(){const raw=localStorage.getItem(KEY);return raw?JSON.parse(raw):JSON.parse(JSON.stringify(DEFAULTS));}
function save(data){localStorage.setItem(KEY,JSON.stringify(data));}
function stars(r){return"★".repeat(Math.floor(r))+(r%1>=0.5?"½":"")+" "+r;}
function colorFor(cat){return CATEGORY_COLOR[cat]||"#4a6070";}

function render(){
  const data=load();renderItinerary(data);
  const container=document.getElementById("cards"),filtersEl=document.getElementById("filters");
  const cats=["all",...new Set(data.map(a=>a.category))];
  filtersEl.innerHTML=cats.map(c=>`<button class="filter-btn ${activeFilter===c?"active":""}" onclick="setFilter('${c}',this)">${c==="all"?"全部":(CATEGORY_EMOJI[c]||"")+" "+c}</button>`).join("");
  const filtered=data.filter(a=>activeFilter==="all"||a.category===activeFilter).sort((a,b)=>b.rating-a.rating);
  if(filtered.length===0){container.innerHTML='<p class="empty-msg">目前沒有符合條件的景點</p>';}
  else{
    container.innerHTML=filtered.map(a=>`
      <div class="card">
        <div class="card-header" style="background:linear-gradient(135deg,${colorFor(a.category)},${colorFor(a.category)}cc)">
          <div class="card-header-top">
            <span class="category-tag">${CATEGORY_EMOJI[a.category]||"📍"} ${a.category}</span>
            <span class="rating-tag">★ ${a.rating}</span>
          </div>
          <div class="card-title">${a.name}</div>
        </div>
        <div class="card-body">
          ${a.hours    ?`<div class="info-row"><span class="icon">🕐</span><span>${a.hours}</span></div>`:""}
          ${a.duration ?`<div class="info-row"><span class="icon">⏱</span><span>${a.duration}</span></div>`:""}
          ${a.price    ?`<div class="info-row"><span class="icon">💰</span><span>${a.price}</span></div>`:""}
          ${a.transport?`<div class="info-row"><span class="icon">🚌</span><span>${a.transport}</span></div>`:""}
          ${a.tips     ?`<div class="tips-box">💡 ${a.tips}</div>`:""}
        </div>
        <div class="card-actions">
          <button class="btn-add-itin" data-id="${a.id}" onclick="addToItin(${a.id})">加入行程</button>
          <button class="btn-edit" onclick="openModal(${a.id})">編輯</button>
          <button class="btn-del"  onclick="deleteAttraction(${a.id})">刪除</button>
        </div>
      </div>`).join("");
  }
  document.getElementById("subtitle").textContent=`共 ${data.length} 個景點`;
}

function setFilter(cat){activeFilter=cat;render();}
function openModal(id){editingId=id||null;const data=load();document.getElementById("modal-title").textContent=id?"編輯景點":"新增景點";if(id){const a=data.find(x=>x.id===id);document.getElementById("f-name").value=a.name;document.getElementById("f-category").value=a.category;document.getElementById("f-rating").value=a.rating;document.getElementById("f-duration").value=a.duration||"";document.getElementById("f-price").value=a.price||"";document.getElementById("f-transport").value=a.transport||"";document.getElementById("f-tips").value=a.tips||"";}else{["f-name","f-rating","f-duration","f-price","f-transport","f-tips"].forEach(fid=>document.getElementById(fid).value="");document.getElementById("f-category").value="景點";}document.getElementById("overlay").classList.add("open");}
function closeModal(){document.getElementById("overlay").classList.remove("open");editingId=null;}
function closeOnBg(e){if(e.target===document.getElementById("overlay"))closeModal();}
function saveAttraction(){const name=document.getElementById("f-name").value.trim();const rating=parseFloat(document.getElementById("f-rating").value);if(!name){alert("請填寫景點名稱");return;}if(isNaN(rating)||rating<1||rating>5){alert("評分請填 1.0–5.0");return;}const entry={name,category:document.getElementById("f-category").value,rating:Math.round(rating*10)/10,duration:document.getElementById("f-duration").value.trim(),price:document.getElementById("f-price").value.trim(),transport:document.getElementById("f-transport").value.trim(),tips:document.getElementById("f-tips").value.trim()};const data=load();if(editingId){const i=data.findIndex(x=>x.id===editingId);data[i]={...data[i],...entry};}else{entry.id=Date.now();data.push(entry);}save(data);closeModal();render();}
function deleteAttraction(id){const data=load();const name=data.find(x=>x.id===id)?.name;if(!confirm(`確定刪除「${name}」？`))return;save(data.filter(x=>x.id!==id));render();}
function resetData(){if(!confirm("還原所有預設景點？目前的新增與修改將會消失。"))return;localStorage.removeItem(KEY);activeFilter="all";render();}
function switchTab(name){document.querySelectorAll(".tab-content").forEach(el=>el.classList.remove("active"));document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active"));document.getElementById("tab-"+name).classList.add("active");document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add("active");if(name==="budget")renderBudget();}

render();
</script>
</body>
</html>
